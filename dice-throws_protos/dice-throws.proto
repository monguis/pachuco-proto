syntax = "proto3";

import "google/api/timestamp.proto";

package pachuco_proto;

option go_package = "github.com/monguis/pachuco-proto";

service DiceThrow{
  rpc PostThrow (ThrowRequest) returns (ThrowResponse);
}

message ThrowIdRequest {
  string gameId = 1;
  string playerId = 2;
}

message ThrowRequest{
  string gameId = 1;
  string playerId = 2;
}

message ThrowResponse{
  repeated int32 dice = 1;
  string combo = 2;
  int32 most_repeated_die = 3;
  optional int32 second_most_repeated_die = 4;
}

message ThrowResponseLegacy{
  string id =1;
  google.protobuf.Timestamp created_at = 2;
  string house_player_id = 3;
  string contestant_player_id = 4;
  repeated int32 house_dice = 5;
  repeated int32 contestant_dice = 6;
  float bet_amount = 7;
  string game_id = 8;
  int32 game_round = 9;
}