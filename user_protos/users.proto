syntax = "proto3";

package pachuco_proto;

option go_package = "github.com/monguis/pachuco-proto";

service User {
  rpc GetUser (UserIdRequest) returns (UserResponse);
  rpc GetUserByEmail (EmailRequest) returns (UserResponse);
  rpc GetUserByAuthId (AuthIdRequest) returns (UserResponse);
  rpc AddPlayerUser (UserRequest) returns (UserResponse);
  rpc UpdateUser (UpdateUserRequest) returns (UserResponse);
  rpc DeleteUser (UserIdRequest) returns (UserResponse);
}

message UserIdRequest {
  string id = 1;
}

message AuthIdRequest {
  string auth_id = 1;
}

message EmailRequest {
  string email = 1;
}

message UserRequest {
  string nickname = 1;
  string email = 2;
  string first_name = 3;
  string last_name = 4;
  float balance = 5;
  string username = 6;
  string auth_id = 7;
  repeated string roles = 8;
}

message UserResponse {
  string id = 1;
  string username = 2;
  string email = 3;
  string nickname = 4;
  string auth_id = 5; // Note: proto uses snake_case by convention
  repeated string roles = 6;
}

message UpdateUserRequest {
  string id =1;
  UserRequest user =2;
}
